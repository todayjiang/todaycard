<style>
  :root {
    --ink: #1a1410;
    --paper: #f5f0e8;
    --gold: #c8a96e;
    --rose: #d4857a;
    --sage: #7a9e8e;
    --mist: #e8e2d8;
    --shadow: rgba(26,20,16,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--paper);
    background-image:

      radial-gradient(ellipse at 80% 90%, rgba(212,133,122,0.10) 0%, transparent 50%);
    min-height: 100vh;
    font-family: 'Noto Serif TC', serif;
    color: var(--ink);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;
  }

  header {
    text-align: center;
    margin-bottom: 50px;
    animation: fadeDown 1s ease both;
  }

  .logo-symbol {
    font-size: 2rem;
    letter-spacing: 0.3em;
    color: var(--gold);
    margin-bottom: 8px;
    display: block;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 400;
    letter-spacing: 0.08em;
    line-height: 1.2;
    color: var(--ink);
  }

  h1 em {
    font-style: italic;
    color: var(--rose);
  }

  .subtitle {
    margin-top: 10px;
    font-size: 0.85rem;
    letter-spacing: 0.25em;
    color: var(--sage);
    text-transform: uppercase;
  }

  /* Decorative line */
  .deco-line {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 18px auto;
    width: fit-content;
  }
  .deco-line span { display: block; height: 1px; width: 60px; background: var(--gold); opacity: 0.5; }
  .deco-line i { color: var(--gold); font-style: normal; font-size: 0.7rem; }

  /* Form card */
  .form-wrapper {
    width: 100%;
    max-width: 480px;
    animation: fadeUp 1s 0.3s ease both;
  }

  .form-card {
    background: rgba(255,255,255,0.55);
    border: 1px solid rgba(200,169,110,0.3);
    border-radius: 20px;
    padding: 40px 36px;
    backdrop-filter: blur(10px);
    box-shadow:
      0 4px 30px var(--shadow),
      inset 0 1px 0 rgba(255,255,255,0.8);
  }

  .field {
    margin-bottom: 24px;
  }

  label {
    display: block;
    font-size: 0.78rem;
    letter-spacing: 0.2em;
    color: var(--sage);
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  input {
    width: 100%;
    padding: 13px 16px;
    border: 1.5px solid var(--mist);
    border-radius: 10px;
    background: rgba(255,255,255,0.7);
    font-family: 'Noto Serif TC', serif;
    font-size: 1rem;
    color: var(--ink);
    transition: border-color 0.25s, box-shadow 0.25s;
    outline: none;
  }

  input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(200,169,110,0.15);
  }

  input::placeholder { color: #bbb; }

  .draw-btn {
    width: 100%;
    padding: 15px;
    margin-top: 8px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 12px;
    font-family: 'Noto Serif TC', serif;
    font-size: 1.05rem;
    letter-spacing: 0.2em;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .draw-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px var(--shadow);
  }

  .draw-btn:active { transform: translateY(0); }

  .draw-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(200,169,110,0.2));
    pointer-events: none;
  }

  /* Result area */
  #result-area {
    width: 100%;
    max-width: 480px;
    margin-top: 36px;
    display: none;
    animation: fadeUp 0.8s ease both;
  }

  .card-envelope {
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 12px 50px rgba(26,20,16,0.18);
  }

  .card-bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(145deg, #2c2520 0%, #1a1410 60%, #251e18 100%);
  }

  .card-pattern {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 15% 85%, rgba(200,169,110,0.18) 0%, transparent 40%),
      radial-gradient(circle at 85% 15%, rgba(212,133,122,0.15) 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, rgba(122,158,142,0.08) 0%, transparent 60%);
  }

  .card-border {
    position: absolute;
    inset: 12px;
    border: 1px solid rgba(200,169,110,0.35);
    border-radius: 12px;
    pointer-events: none;
  }

  .card-content {
    position: relative;
    padding: 44px 36px 40px;
    text-align: center;
    z-index: 1;
  }

  .card-tag {
    display: inline-block;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
    border: 1px solid rgba(200,169,110,0.4);
    padding: 4px 14px;
    border-radius: 20px;
    margin-bottom: 24px;
  }

  .numerology-info {
    display: flex;
    justify-content: center;
    gap: 28px;
    margin-bottom: 28px;
  }

  .num-item {
    text-align: center;
  }

  .num-label {
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: rgba(200,169,110,0.7);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .num-value {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    color: var(--gold);
    line-height: 1;
  }

  .card-divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(200,169,110,0.5), transparent);
    margin: 0 auto 24px;
  }

  .card-emoji {
    font-size: 2.4rem;
    margin-bottom: 16px;
    display: block;
    filter: drop-shadow(0 0 12px rgba(200,169,110,0.4));
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--gold);
    font-style: italic;
    margin-bottom: 18px;
    letter-spacing: 0.05em;
  }

  .card-message {
    font-size: 1rem;
    line-height: 2;
    color: rgba(245,240,232,0.88);
    letter-spacing: 0.05em;
  }

  .card-footer {
    margin-top: 28px;
    font-size: 0.72rem;
    color: rgba(200,169,110,0.5);
    letter-spacing: 0.2em;
  }

  /* Loading state */
  .loading-dots {
    display: inline-flex;
    gap: 6px;
    align-items: center;
  }
  .loading-dots span {
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    animation: dot-pulse 1.2s infinite ease-in-out;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot-pulse {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes cardReveal {
    from { opacity: 0; transform: scale(0.92) rotateX(8deg); }
    to { opacity: 1; transform: scale(1) rotateX(0); }
  }

  .card-reveal { animation: cardReveal 0.7s cubic-bezier(0.16,1,0.3,1) both; }

  .error-msg {
    color: var(--rose);
    font-size: 0.82rem;
    margin-top: 10px;
    text-align: center;
    letter-spacing: 0.05em;
  }

  .privacy-notice {
    margin-top: 14px;
    font-size: 0.72rem;
    color: #aaa;
    line-height: 1.7;
    text-align: center;
    letter-spacing: 0.03em;

  .follow-block {

    max-width: 480px;
    margin-top: 36px;

    text-decoration: none;

  }

  footer {
    margin-top: 60px;
    text-align: center;
    font-size: 0.72rem;
    color: #bbb;
    letter-spacing: 0.15em;

</style>
</head>

function pickBlessing(lifePath, dateStr) {
  // 用今天日期＋生命靈數產生每日不同的索引
  const today = new Date();
  const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 86400000);
  const key = BLESSINGS[lifePath] ? lifePath : 9;
  const list = BLESSINGS[key];
  const idx = (dayOfYear + lifePath) % list.length;
  return list[idx];
}

function calcLifePath(dateStr) {
  const digits = dateStr.replace(/-/g, '').split('').map(Number);
  let sum = digits.reduce((a, b) => a + b, 0);
  while (sum > 9 && sum !== 11 && sum !== 22 && sum !== 33) {
    sum = String(sum).split('').map(Number).reduce((a, b) => a + b, 0);
  }
  return sum;
}

function calcYearNumber(dateStr, currentYear) {
  const [, month, day] = dateStr.split('-');
  const digits = (String(currentYear) + month + day).split('').map(Number);
  let sum = digits.reduce((a, b) => a + b, 0);
  while (sum > 9) {
    sum = String(sum).split('').map(Number).reduce((a, b) => a + b, 0);
  }
  return sum;
}

function pickCard(lifePath, yearNum) {
  const idx = (lifePath + yearNum - 2) % CARDS.length;
  return CARDS[idx];
}

function pickBlessing(yearNum) {
  const key = yearNum <= 9 ? yearNum : 9;
  const list = BLESSINGS[key] || BLESSINGS[9];
  return list[Math.floor(Math.random() * list.length)];
}

async function drawCard() {
  const name = document.getElementById('name').value.trim();
  const birthday = document.getElementById('birthday').value;
  const email = document.getElementById('email').value.trim();
  const errEl = document.getElementById('error-msg');

  errEl.textContent = '';

  if (!name) { errEl.textContent = '請輸入你的名字 🌸'; return; }
  if (!birthday) { errEl.textContent = '請輸入出生年月日 🗓️'; return; }
  if (!email || !email.includes('@')) { errEl.textContent = '請輸入有效的 Email 📬'; return; }

  const btn = document.querySelector('.draw-btn');
  btn.innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span>';
  btn.disabled = true;

  const currentYear = new Date().getFullYear();
  const lifePath = calcLifePath(birthday);
  const yearNum = calcYearNumber(birthday, currentYear);
  const card = pickCard(lifePath, yearNum);
  const blessing = pickBlessing(lifePath, birthday);

  // 送出資料到 Google Sheets
  try {
    const submittedAt = new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' });
    await fetch('https://script.google.com/macros/s/AKfycbyxArol6XUhIOyRP06zevw7exlX2w5O8NAxaVO4om-l4_EdnP5VollvkufBSgL2XoWLOA/exec', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: name,
        birthday: birthday,
        email: email,
        lifePath: String(lifePath),
        yearNumber: String(yearNum),
        blessing: blessing,
        submittedAt: submittedAt
      })
    });
  } catch(e) { /* 不影響使用者體驗 */ }

  // Simulate thoughtful pause
  await new Promise(r => setTimeout(r, 1800));

  const resultArea = document.getElementById('result-area');
  const cardContent = document.getElementById('card-content');
  const envelope = document.getElementById('card-envelope');

  const today = new Date().toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric' });

  cardContent.innerHTML = `
    <div class="card-tag">${today} · 為 ${name} 抽取</div>
    <div class="numerology-info">
      <div class="num-item">
        <div class="num-label">生命靈數</div>
        <div class="num-value">${lifePath}</div>
      </div>

        <div class="num-label">流年數字</div>
        <div class="num-value">${yearNum}</div>
      </div>
    </div>
    <div class="card-divider"></div>
    <span class="card-emoji">${card.emoji}</span>
    <div class="card-title">${card.title}</div>
    <div class="card-message">${blessing}</div>
    <div class="card-footer">✦ 今天先醬，好好過 ✦</div>
  `;

  resultArea.style.display = 'block';
  envelope.classList.remove('card-reveal');
  void envelope.offsetWidth;
  envelope.classList.add('card-reveal');

  resultArea.scrollIntoView({ behavior: 'smooth', block: 'start' });

  btn.innerHTML = '✦ 再抽一次 ✦';
  btn.disabled = false;
}
